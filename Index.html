<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <title>Menú de Mini Postres</title>
  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main>
    <header>
      <h1>🍮 Menú de Mini Postres</h1>
      <p>Descubre un menú interactivo con tarjetas animadas y un visor 3D para tus mini postres favoritos.</p>
    </header>

    <section id="menu" class="menu-grid"></section>

    <section id="preview" class="preview-card hidden">
      <div class="preview-header">
        <div>
          <h2 id="preview-name">Mini Cheesecake</h2>
          <p id="preview-description">Un bocado dulce que combina crema suave y base crujiente.</p>
        </div>
        <span class="preview-tag">Modelo 3D</span>
      </div>
      <model-viewer id="preview-model" src="" alt="" camera-controls auto-rotate interaction-prompt="auto" shadow-intensity="1"></model-viewer>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
